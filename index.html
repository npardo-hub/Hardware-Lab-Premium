<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Lab Premium - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --premium-blue: #2563eb; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; overflow-x: hidden; }
        
        #model-menu {
            display: none;
            position: absolute;
            top: 3.5rem;
            left: 0;
            width: 16rem;
            background: white;
            border: 1px solid black;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            z-index: 100;
        }
        #model-menu.active { display: block !important; }
        .specs-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            margin-bottom: 1rem;
        }
        @media (min-width: 1024px) {
            .specs-container {
                position: absolute;
                top: 2rem;
                left: 2rem;
                width: auto;
                margin-bottom: 0;
            }
        }
        .tech-badge {
            border-left: 2px solid var(--premium-blue);
            padding-left: 1rem;
        }
        .image-viewer-flex {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        @media (min-width: 1024px) {
            .image-viewer-flex {
                flex-direction: row;
                min-height: 80vh; 
            }
        }
        .view-btn.active { border-color: black; font-weight: 700; }
        #main-image { transition: opacity 0.2s ease-in-out; }
    </style>
</head>
<body>
    <header class="fixed top-0 w-full h-16 bg-white/80 backdrop-blur-md border-b flex items-center justify-between px-8 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 border-2 border-black rounded-full flex items-center justify-center font-bold text-[9px]">HLP</div>
            <span class="text-xs font-bold uppercase tracking-widest">Hardware Lab</span>
        </div>
        <nav class="relative">
            <button id="btn-modelos" class="text-[10px] font-bold uppercase tracking-widest">Modelos ▼</button>
            <div id="model-menu">
                <ul id="model-list" class="divide-y divide-gray-100"></ul>
            </div>
        </nav>
        <div class="text-[10px] font-bold uppercase tracking-widest">Carrito (<span id="cart-count">0</span>)</div>
    </header>
    <main class="pt-20 lg:pt-16 flex flex-col lg:flex-row min-h-screen">
        <section class="w-full lg:w-2/3 p-6 lg:p-12 image-viewer-flex">
            <div class="specs-container">
                <div class="tech-badge">
                    <p class="text-[9px] text-gray-400 font-bold uppercase">VRAM</p>
                    <p id="info-vram" class="text-xl lg:text-3xl font-light">--</p>
                </div>
                <div class="tech-badge">
                    <p class="text-[9px] text-gray-400 font-bold uppercase">TDP</p>
                    <p id="info-tdp" class="text-xl lg:text-3xl font-light">--</p>
                </div>
            </div>
            <div class="w-full max-w-2xl flex flex-col items-center">
                <img id="main-image" src="" alt="GPU View" class="w-full h-auto max-h-[50vh] lg:max-h-none object-contain mb-6 lg:mb-8">
                
                <div class="flex border border-gray-200 rounded-full p-1 bg-gray-50">
                    <button id="view-front" class="view-btn active px-4 lg:px-6 py-2 text-[9px] lg:text-[10px] font-bold uppercase tracking-widest border-b-2 border-transparent transition-all">Frente</button>
                    <button id="view-back" class="view-btn px-4 lg:px-6 py-2 text-[9px] lg:text-[10px] font-bold uppercase tracking-widest border-b-2 border-transparent transition-all">Posterior</button>
                </div>
            </div>

            <div class="text-center mt-8 lg:mt-12 lg:absolute lg:bottom-10 lg:left-1/2 lg:-translate-x-1/2">
                <h2 id="gpu-name" class="text-3xl lg:text-5xl font-light uppercase tracking-tighter"></h2>
                <p id="gpu-edition-label" class="text-blue-600 text-[9px] lg:text-[10px] font-bold uppercase tracking-[0.4em] mt-3 lg:mt-4"></p>
            </div>
        </section>

        <aside class="w-full lg:w-1/3 bg-gray-50 border-t lg:border-t-0 lg:border-l p-6 lg:p-10 flex flex-col justify-between">
            <div class="space-y-8 lg:space-y-12">
                <div>
                    <h3 class="text-[9px] lg:text-[10px] font-bold uppercase text-gray-400 mb-4 lg:mb-6 tracking-widest">Edición</h3>
                    <div id="edition-selector" class="flex gap-3 lg:gap-4 flex-wrap"></div>
                </div>
                <div id="tech-container" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div class="pt-6 lg:pt-8 border-t mt-8 lg:mt-0">
                <p id="final-price" class="text-4xl lg:text-5xl font-light tracking-tighter mb-6 lg:mb-8">$0.00</p>
                <button class="w-full bg-black text-white py-4 lg:py-5 text-[10px] lg:text-[11px] font-bold uppercase tracking-widest hover:bg-blue-700 transition-all">Añadir al Carrito</button>
            </div>
        </aside>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
