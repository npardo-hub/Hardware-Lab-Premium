<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Lab Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --premium-blue: #2563eb; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; }
        #model-menu {
            display: none;
            position: absolute;
            top: 3.5rem;
            left: 0;
            width: 16rem;
            background: white;
            border: 1px solid black;
            z-index: 100;
        }
        #model-menu.active { display: block !important; }
        .view-btn.active { border-color: black; font-weight: 700; }
        #main-image { transition: opacity 0.2s ease-in-out; min-height: 300px; }
    </style>
</head>
<body>
    <header class="fixed top-0 w-full h-16 bg-white border-b flex items-center justify-between px-8 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 border-2 border-black rounded-full flex items-center justify-center font-bold text-[9px]">HLP</div>
            <span class="text-xs font-bold uppercase tracking-widest">Hardware Lab</span>
        </div>
        <nav class="relative">
            <button id="btn-modelos" class="text-[10px] font-bold uppercase tracking-widest">Modelos ▼</button>
            <div id="model-menu"><ul id="model-list" class="divide-y divide-gray-100"></ul></div>
        </nav>
        <div class="text-[10px] font-bold uppercase">Carrito (0)</div>
    </header>

    <main class="pt-16 flex flex-col lg:flex-row min-h-screen">
        <section class="w-full lg:w-2/3 p-12 flex flex-col justify-center items-center relative">
            <div class="absolute top-10 left-10 space-y-8">
                <div class="border-l-2 border-blue-600 pl-4">
                    <p class="text-[9px] text-gray-400 font-bold uppercase">VRAM</p>
                    <p id="info-vram" class="text-3xl font-light">--</p>
                </div>
                <div class="border-l-2 border-blue-600 pl-4">
                    <p class="text-[9px] text-gray-400 font-bold uppercase">TDP</p>
                    <p id="info-tdp" class="text-3xl font-light">--</p>
                </div>
            </div>
            <div class="w-full max-w-2xl flex flex-col items-center">
                <img id="main-image" src="" alt="GPU" class="w-full h-auto object-contain mb-8">
                <div class="flex border border-gray-200 rounded-full p-1 bg-gray-50">
                    <button id="view-front" class="view-btn active px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-all">Frente</button>
                    <button id="view-back" class="view-btn px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-all">Posterior</button>
                </div>
            </div>
            <div class="text-center mt-12">
                <h2 id="gpu-name" class="text-5xl font-light uppercase tracking-tighter"></h2>
                <p id="gpu-edition-label" class="text-blue-600 text-[10px] font-bold uppercase tracking-[0.4em] mt-4"></p>
            </div>
        </section>

        <aside class="w-full lg:w-1/3 bg-gray-50 border-l p-10 flex flex-col justify-between">
            <div class="space-y-12">
                <div>
                    <h3 class="text-[10px] font-bold uppercase text-gray-400 mb-6">Edición</h3>
                    <div id="edition-selector" class="flex gap-4"></div>
                </div>
                <div id="tech-container" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div class="pt-8 border-t">
                <span id="final-price" class="text-5xl font-light tracking-tighter">$0.00</span>
                <button class="w-full bg-black text-white py-5 mt-8 text-[11px] font-bold uppercase tracking-widest hover:bg-blue-700 transition-all">Añadir al Carrito</button>
            </div>
        </aside>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
